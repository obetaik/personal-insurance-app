version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: insurance-mysql
    restart: unless-stopped
    env_file:
      .env    
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: inventory_db
      MYSQL_USER: tony
      MYSQL_PASSWORD: tonytony123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - insurance-network

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    container_name: insurance-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]  # Corrected path
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s  # Give the app time to start
    networks:
      - insurance-network

  frontend:
    build: ./frontend
    env_file:
      - ./frontend/.env
    container_name: insurance-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - insurance-network

networks:
  insurance-network:
    driver: bridge

volumes:
  mysql-data: